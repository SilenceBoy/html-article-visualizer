<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Form based config editor with diff export">
  <rect width="1200" height="675" fill="#FAF8F5"/>
  <defs>
    <style>
      .mono{font:19px ui-monospace,monospace;fill:#8A837A}
      .serif{font:700 30px Georgia,serif;fill:#141413}
      .label{font:15px ui-monospace,monospace;letter-spacing:.16em;fill:#8A837A}
    </style>
  </defs>
  <g transform="translate(44 46)">
    <rect width="708" height="558" rx="17" fill="#FFFDF9" stroke="#D4CFC7" stroke-width="2"/>
