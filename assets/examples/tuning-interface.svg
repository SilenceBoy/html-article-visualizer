<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Browser tuning interface exports prompt values back to an agent">
  <rect width="1200" height="675" fill="#FAF8F5"/>
  <defs>
    <style>
      .mono{font:20px ui-monospace,monospace;fill:#8A837A}
      .serif{font:700 30px Georgia,serif;fill:#141413}
      .label{font:19px system-ui,sans-serif;fill:#8A837A}
      .track{stroke:#D4CFC7;stroke-width:7;stroke-linecap:round}
      .fill{stroke:#66635d;stroke-width:7;stroke-linecap:round}
    </style>
  </defs>
  <g transform="translate(63 58)">
    <rect width="506" height="502" rx="17" fill="#FFFDF9" stroke="#D4CFC7" stroke-width="2"/>
    <rect width="506" height="54" rx="17" fill="#F0EDE8"/>
    <path d="M0 54h506" stroke="#D4CFC7"/>
    <circle cx="30" cy="27" r="7" fill="#D4CFC7"/><circle cx="53" cy="27" r="7" fill="#D4CFC7"/><circle cx="76" cy="27" r="7" fill="#D4CFC7"/>
    <text class="mono" x="373" y="32" text-anchor="middle">checkout-button.html</text>
    <text class="serif" x="35" y="101">Hover animation</text>
    <g transform="translate(35 145)">
      <text class="label" x="0" y="5">duration</text><text class="mono" x="435" y="5" text-anchor="end" fill="#2C2825">220ms</text>
      <path class="track" d="M0 28h435"/><path class="fill" d="M0 28h235"/><circle cx="235" cy="28" r="10" fill="#141413"/>
      <text class="label" x="0" y="74">scale</text><text class="mono" x="435" y="74" text-anchor="end" fill="#2C2825">1.04</text>
      <path class="track" d="M0 97h435"/><path class="fill" d="M0 97h132"/><circle cx="132" cy="97" r="10" fill="#141413"/>
      <text class="label" x="0" y="143">shadow blur</text><text class="mono" x="435" y="143" text-anchor="end" fill="#2C2825">8px</text>
      <path class="track" d="M0 166h435"/><path class="fill" d="M0 166h315"/><circle cx="315" cy="166" r="10" fill="#141413"/>
      <text class="label" x="0" y="212">spring easing</text>
      <rect x="382" y="196" width="55" height="30" rx="15" fill="#141413"/><circle cx="421" cy="211" r="11" fill="#FFFDF9"/>
      <path d="M0 250h435" stroke="#E3DACC"/>
      <rect x="0" y="276" width="230" height="50" rx="12" fill="#D97757"/>
      <text x="115" y="308" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#fff">Copy as prompt</text>
      <text class="label" x="435" y="309" text-anchor="end">Reset</text>
    </g>
  </g>
  <path d="M400 528 C560 528 590 370 685 317" fill="none" stroke="#D97757" stroke-width="3" stroke-dasharray="8 8"/>
  <path d="M684 317l-17-3 8 15z" fill="#D97757"/>
  <g transform="translate(664 58)">
    <rect width="472" height="502" rx="17" fill="#11110F"/>
    <rect width="472" height="54" rx="17" fill="#1D1B18"/>
    <circle cx="30" cy="27" r="7" fill="#3A3935"/><circle cx="53" cy="27" r="7" fill="#3A3935"/><circle cx="76" cy="27" r="7" fill="#3A3935"/>
    <text class="mono" x="390" y="32" text-anchor="middle">claude code</text>
    <text class="mono" x="32" y="100">&gt; apply these to the real</text>
    <text class="mono" x="32" y="128">CheckoutButton component:</text>
    <rect x="32" y="155" width="410" height="168" rx="9" fill="#1F1E1B" stroke="#3D3A35"/>
    <text class="mono" x="56" y="197">duration: <tspan fill="#EEE9DF">220ms</tspan></text>
    <text class="mono" x="56" y="228">scale: <tspan fill="#EEE9DF">1.04</tspan></text>
    <text class="mono" x="56" y="259">shadow: <tspan fill="#EEE9DF">8px</tspan></text>
    <text class="mono" x="56" y="290">easing: <tspan fill="#EEE9DF">spring</tspan></text>
    <text class="mono" x="32" y="368" fill="#EEE9DF">Updating CheckoutButton.tsx</text>
    <text class="mono" x="32" y="396" fill="#EEE9DF">with the tuned values ...</text>
    <rect x="32" y="414" width="13" height="22" fill="#8A8A82"/>
  </g>
  <text x="600" y="608" text-anchor="middle" font-family="system-ui,sans-serif" font-size="19" fill="#8A837A">Tune in the browser, paste the result back into the agent</text>
