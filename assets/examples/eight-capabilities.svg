      <rect x="76" y="54" width="98" height="74" rx="7" fill="#141413"/>
      <path class="line" d="M99 72h52M99 88h67M99 105h45M99 121h59" stroke="#C7C1B7"/>
      <text class="title" x="125" y="190" text-anchor="middle">Code</text>
      <text class="sub" x="125" y="222" text-anchor="middle">Highlighted snippets</text>
    </g>
    <g transform="translate(0 295)">
      <rect class="card" width="250" height="250" rx="15"/>
      <line x1="75" y1="70" x2="175" y2="70" stroke="#E2DFD8" stroke-width="16" stroke-linecap="round"/>
      <line x1="75" y1="70" x2="138" y2="70" stroke="#D97757" stroke-width="16" stroke-linecap="round"/>
      <circle cx="138" cy="70" r="13" fill="#FAF8F5" stroke="#D97757" stroke-width="4"/>
      <line x1="75" y1="114" x2="175" y2="114" stroke="#E2DFD8" stroke-width="16" stroke-linecap="round"/>
      <line x1="75" y1="114" x2="108" y2="114" stroke="#8A8A82" stroke-width="16" stroke-linecap="round"/>
      <circle cx="108" cy="114" r="13" fill="#FAF8F5" stroke="#8A8A82" stroke-width="4"/>
      <text class="title" x="125" y="190" text-anchor="middle">Interaction</text>
      <text class="sub" x="125" y="222" text-anchor="middle">Sliders, toggles, JS</text>
    </g>
    <g transform="translate(285 295)">
      <rect class="card" width="250" height="250" rx="15"/>
      <rect x="63" y="78" width="32" height="32" rx="5" fill="#fff" stroke="#2C2825" stroke-width="3"/>
      <rect x="113" y="78" width="32" height="32" rx="5" fill="#E3DACC" stroke="#2C2825" stroke-width="3"/>
      <rect x="163" y="78" width="32" height="32" rx="5" fill="#141413"/>
      <path d="M96 94h17M146 94h17" stroke="#8A837A" stroke-width="3" marker-end="url(#arrow)"/>
      <text class="title" x="125" y="190" text-anchor="middle">Workflows</text>
      <text class="sub" x="125" y="222" text-anchor="middle">Boxes, arrows, flow</text>
    </g>
    <g transform="translate(570 295)">
      <rect class="card" width="250" height="250" rx="15"/>
      <path d="M76 64v70h98" fill="none" stroke="#8A837A" stroke-width="3"/>
      <circle cx="100" cy="109" r="6" fill="#2C2825"/>
      <circle cx="120" cy="88" r="6" fill="#8A8A82"/>
      <circle cx="140" cy="106" r="6" fill="#4F4D48"/>
      <circle cx="160" cy="78" r="6" fill="#77746D"/>
      <text class="title" x="125" y="190" text-anchor="middle">Spatial</text>
      <text class="sub" x="125" y="222" text-anchor="middle">Canvas &amp; coordinates</text>
    </g>
    <g transform="translate(855 295)">
