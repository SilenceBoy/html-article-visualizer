      <rect x="77" y="54" width="98" height="74" rx="7" fill="#F0EDE8" stroke="#77746D" stroke-width="3"/>
      <circle cx="151" cy="76" r="10" fill="#E3DACC"/>
      <path d="M82 126l34-43 24 30 19-22 18 35z" fill="#CFC9BD"/>
      <text class="title" x="125" y="190" text-anchor="middle">Images</text>
      <text class="sub" x="125" y="222" text-anchor="middle">Embedded figures</text>
    </g>
  </g>
  <text x="600" y="636" text-anchor="middle" font-family="system-ui,sans-serif" font-size="21" fill="#8A837A">Eight kinds of information a single HTML file can carry</text>
