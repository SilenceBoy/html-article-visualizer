<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Eight kinds of information a single HTML file can carry">
  <rect width="1200" height="675" fill="#FAF8F5"/>
  <defs>
    <style>
      .card{fill:#FFFDF9;stroke:#D4CFC7;stroke-width:2}
      .title{font:700 26px Georgia,serif;fill:#141413}
      .sub{font:18px system-ui,sans-serif;fill:#6F6A63}
      .mono{font:17px ui-monospace,monospace;fill:#8A837A}
      .line{stroke:#8A837A;stroke-width:4;stroke-linecap:round}
    </style>
  </defs>
  <g transform="translate(50 68)">
    <g transform="translate(0 0)">
      <rect class="card" width="250" height="250" rx="15"/>
      <g transform="translate(78 55)">
        <rect x="0" y="0" width="94" height="70" rx="6" fill="#fff" stroke="#77746d" stroke-width="3"/>
        <rect x="0" y="0" width="94" height="22" fill="#E3DACC" stroke="#77746d" stroke-width="3"/>
        <path d="M31 0v70M63 0v70M0 45h94" stroke="#C7C1B7"/>
      </g>
      <text class="title" x="125" y="190" text-anchor="middle">Tables</text>
      <text class="sub" x="125" y="222" text-anchor="middle">Real rows &amp; columns</text>
    </g>
    <g transform="translate(285 0)">
      <rect class="card" width="250" height="250" rx="15"/>
      <rect x="68" y="64" width="22" height="22" rx="4" fill="#141413"/>
      <rect x="99" y="64" width="22" height="22" rx="4" fill="#788C5D"/>
      <rect x="130" y="64" width="22" height="22" rx="4" fill="#E3DACC"/>
      <rect x="161" y="64" width="22" height="22" rx="4" fill="#FAF8F5" stroke="#D4CFC7"/>
      <text class="mono" x="125" y="114" text-anchor="middle">font: serif</text>
      <text class="title" x="125" y="190" text-anchor="middle">Design</text>
      <text class="sub" x="125" y="222" text-anchor="middle">Color, type, spacing</text>
    </g>
    <g transform="translate(570 0)">
      <rect class="card" width="250" height="250" rx="15"/>
      <circle cx="99" cy="75" r="19" fill="#fff" stroke="#2C2825" stroke-width="3"/>
      <rect x="134" y="56" width="34" height="34" rx="4" fill="#E3DACC" stroke="#2C2825" stroke-width="3"/>
      <path d="M75 120l33-28 31 25 30-22" fill="none" stroke="#8A837A" stroke-width="3"/>
      <text class="title" x="125" y="190" text-anchor="middle">Illustrations</text>
      <text class="sub" x="125" y="222" text-anchor="middle">Inline SVG diagrams</text>
    </g>
    <g transform="translate(855 0)">
