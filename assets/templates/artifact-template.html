<!doctype html>
<html lang="{{LANG}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{DESCRIPTION}}">
  <title>{{TITLE}}</title>
  <style>
{{STYLE}}
  </style>
</head>
<body class="hav-page">
  <article>
    <header class="hav-hero">
      <div class="hav-shell">
        <div class="hav-kicker">{{KICKER}}</div>
        <h1 class="hav-title">{{TITLE}}</h1>
        <p class="hav-subtitle">{{SUBTITLE}}</p>
      </div>
    </header>
    <main class="hav-shell">
{{CONTENT}}
    </main>
  </article>
  <button class="hav-button" data-back-top style="position:fixed;right:18px;bottom:18px;z-index:20">Top</button>
  <script>
{{SCRIPT}}
  </script>
</body>
</html>
